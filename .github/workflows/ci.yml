name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Build all modules
        run: mvn compile -B

      - name: Run stepdefs tests
        run: mvn test -pl cucumber-stepdefs -B

      - name: Upload stepdefs test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stepdefs-test-results
          path: cucumber-stepdefs/target/surefire-reports/

      - name: Upload stepdefs test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stepdefs-test-reports
          path: cucumber-stepdefs/target/surefire-reports/*.xml
